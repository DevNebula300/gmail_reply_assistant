openapi: 3.1.0
info:
  title: Gmail Reply Assistant API
  version: 0.1.0
  description: |
    API contract for the AI-Powered Gmail Reply Assistant.
    Phase 0 provides stub endpoints with mock responses so the extension and backend
    can be developed in parallel.

servers:
  - url: http://localhost:8000
    description: Local development

tags:
  - name: health
  - name: auth
  - name: threads
  - name: replies
  - name: preferences

paths:
  /health:
    get:
      tags: [health]
      summary: Health check
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/google/start:
    get:
      tags: [auth]
      summary: Start Google OAuth flow
      operationId: startGoogleAuth
      security: []
      responses:
        "200":
          description: Authorization URL for redirect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStartResponse"

  /auth/google/callback:
    get:
      tags: [auth]
      summary: OAuth callback (handled by backend)
      operationId: googleAuthCallback
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to extension success page

  /auth/me:
    get:
      tags: [auth]
      summary: Current authenticated user
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User session info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSession"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      tags: [auth]
      summary: Revoke session and disconnect Gmail
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Logged out

  /threads/{threadId}:
    get:
      tags: [threads]
      summary: Get cleaned thread context for AI generation
      operationId: getThreadContext
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ThreadId"
      responses:
        "200":
          description: Cleaned thread context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreadContext"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /replies/generate:
    post:
      tags: [replies]
      summary: Generate reply suggestions for a thread
      operationId: generateReplies
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRepliesRequest"
      responses:
        "200":
          description: Three reply suggestions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateRepliesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  /replies/rewrite:
    post:
      tags: [replies]
      summary: Rewrite existing draft text
      operationId: rewriteDraft
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RewriteDraftRequest"
      responses:
        "200":
          description: Rewritten text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RewriteDraftResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /drafts:
    post:
      tags: [replies]
      summary: Create or update a Gmail draft
      operationId: upsertDraft
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertDraftRequest"
      responses:
        "200":
          description: Draft saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpsertDraftResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /preferences/style:
    get:
      tags: [preferences]
      summary: Get user writing style profile
      operationId: getStyleProfile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Style profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StyleProfile"
    put:
      tags: [preferences]
      summary: Update user writing style profile
      operationId: updateStyleProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StyleProfile"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StyleProfile"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ThreadId:
      name: threadId
      in: path
      required: true
      schema:
        type: string
      description: Gmail thread ID

  responses:
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string

    AuthStartResponse:
      type: object
      required: [authorization_url]
      properties:
        authorization_url:
          type: string
          format: uri

    UserSession:
      type: object
      required: [user_id, email, gmail_connected]
      properties:
        user_id:
          type: string
        email:
          type: string
          format: email
        gmail_connected:
          type: boolean
        display_name:
          type: string

    ThreadContext:
      type: object
      required: [thread_id, subject, participants, messages]
      properties:
        thread_id:
          type: string
        subject:
          type: string
        participants:
          type: array
          items:
            type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ThreadMessage"
        fingerprint:
          type: string
          description: Hash used to detect thread changes before insertion

    ThreadMessage:
      type: object
      required: [id, from, date, body]
      properties:
        id:
          type: string
        from:
          type: string
        to:
          type: array
          items:
            type: string
        date:
          type: string
          format: date-time
        body:
          type: string

    Tone:
      type: string
      enum: [professional, friendly, concise, formal, casual]

    Length:
      type: string
      enum: [short, medium, detailed]

    RewriteMode:
      type: string
      enum:
        - professionalize
        - shorten
        - expand
        - simplify
        - translate
        - correct_grammar

    GenerateRepliesRequest:
      type: object
      required: [thread_id, tone, length]
      properties:
        thread_id:
          type: string
        tone:
          $ref: "#/components/schemas/Tone"
        length:
          $ref: "#/components/schemas/Length"
        language:
          type: string
          default: en
        instruction:
          type: string
          description: User objective such as "decline politely"
        thread_fingerprint:
          type: string

    SafetyWarning:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [date, payment, attachment, approval, legal_claim, completed_action]
        message:
          type: string

    ReplySuggestion:
      type: object
      required: [id, text]
      properties:
        id:
          type: string
        text:
          type: string
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/SafetyWarning"

    GenerateRepliesResponse:
      type: object
      required: [request_id, suggestions]
      properties:
        request_id:
          type: string
        suggestions:
          type: array
          minItems: 3
          maxItems: 3
          items:
            $ref: "#/components/schemas/ReplySuggestion"
        thread_fingerprint:
          type: string

    RewriteDraftRequest:
      type: object
      required: [text, mode]
      properties:
        text:
          type: string
        mode:
          $ref: "#/components/schemas/RewriteMode"
        language:
          type: string
          default: en

    RewriteDraftResponse:
      type: object
      required: [text, warnings]
      properties:
        text:
          type: string
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/SafetyWarning"

    UpsertDraftRequest:
      type: object
      required: [thread_id, body]
      properties:
        thread_id:
          type: string
        draft_id:
          type: string
        body:
          type: string
        thread_fingerprint:
          type: string

    UpsertDraftResponse:
      type: object
      required: [draft_id, thread_id]
      properties:
        draft_id:
          type: string
        thread_id:
          type: string

    StyleProfile:
      type: object
      properties:
        default_tone:
          $ref: "#/components/schemas/Tone"
        default_length:
          $ref: "#/components/schemas/Length"
        greeting:
          type: string
        sign_off:
          type: string
        formality:
          type: integer
          minimum: 1
          maximum: 5
        directness:
          type: integer
          minimum: 1
          maximum: 5
        phrases_to_avoid:
          type: array
          items:
            type: string

    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
        request_id:
          type: string